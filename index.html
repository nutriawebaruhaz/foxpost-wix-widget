<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FOXPOST átvevőhely választó</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .wrap {
      padding: 0;
      box-sizing: border-box;
      background: #fff;
    }

    #foxpostFrame {
      width: 100%;
      height: 760px;
      border: 0;
      display: block;
      background: #fff;
    }

    .selected {
      margin: 10px;
      padding: 12px 14px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fafafa;
      font-size: 13px;
      display: none;
      line-height: 1.45;
    }

    .selected b {
      display: block;
      margin-bottom: 6px;
      color: #c60000;
    }

    .debug {
      margin: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #0c172b;
      color: #fff;
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .debug strong {
      color: #8CDA3F;
    }

    .debug .bad {
      color: #ff9b9b;
    }

    .small {
      font-size: 12px;
      opacity: .7;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <iframe
      id="foxpostFrame"
      src="https://cdn.foxpost.hu/apt-finder/v1/app/"
      width="100%"
      height="760"
      frameborder="0"
      loading="lazy">
    </iframe>

    <div class="selected" id="selectedBox">
      <b>Kiválasztva:</b>
      <div id="selectedText"></div>
      <div class="small">A választás automatikusan mentésre kerül a kosár megjegyzésébe.</div>
    </div>

    <div class="debug" id="debugBox">
      <strong>Debug:</strong> FOXPOST iframe betöltve. Válassz egy pontot, majd kattints a FOXPOST “Csomagautomata kiválasztása / Kiválasztom” gombjára.
    </div>
  </div>

  <script>
    console.log("FOXPOST official iframe debug wrapper loaded");

    var rawMessageCount = 0;
    var validPointCount = 0;

    function setDebug(html) {
      var debugBox = document.getElementById("debugBox");

      if (debugBox) {
        debugBox.innerHTML = html;
      }
    }

    function parseMaybeJson(value) {
      if (!value) {
        return null;
      }

      if (typeof value === "object") {
        return value;
      }

      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (error) {
          return null;
        }
      }

      return null;
    }

    function clean(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .replace(/[|\n\r;]/g, ",")
        .trim();
    }

    function shorten(value, maxLength) {
      var text = clean(value);

      if (text.length <= maxLength) {
        return text;
      }

      return text.substring(0, maxLength - 3) + "...";
    }

    function looksLikeFoxpostPoint(value) {
      if (!value || typeof value !== "object") {
        return false;
      }

      var hasName = Boolean(value.name);
      var hasAddress = Boolean(value.address || value.city || value.street);
      var hasId = Boolean(
        value.operator_id ||
        value.operatorId ||
        value.place_id ||
        value.placeId ||
        value.destinationId
      );

      return hasName && hasAddress && hasId;
    }

    function buildSelectedPointText(data) {
      var operatorId = clean(data.operator_id || data.operatorId);
      var placeId = clean(data.place_id || data.placeId);
      var destination = clean(operatorId || placeId || data.destinationId);

      var name = clean(data.name);
      var zip = clean(data.zip);
      var city = clean(data.city);
      var address = clean(data.address);
      var street = clean(data.street);
      var findme = shorten(data.findme, 160);
      var variant = clean(data.variant);
      var serviceString = clean(data.serviceString);
      var paymentOptionsString = clean(data.paymentOptionsString);
      var load = clean(data.load);
      var country = clean(data.country);

      return "FOXPOST"
        + " | " + (name || "-")
        + " | " + ((zip ? zip : "") + (city ? (" " + city) : "")).trim()
        + " | " + (address || street || "-")
        + " | DESTINATION:" + (destination || "-")
        + " | OPERATOR:" + (operatorId || "-")
        + " | PLACE:" + (placeId || "-")
        + (variant ? (" | TYPE:" + variant) : "")
        + (serviceString ? (" | SERVICE:" + serviceString) : "")
        + (paymentOptionsString ? (" | PAYMENT:" + paymentOptionsString) : "")
        + (load ? (" | LOAD:" + load) : "")
        + (country ? (" | COUNTRY:" + country) : "")
        + (findme ? (" | FINDME:" + findme) : "");
    }

    function showSelected(selectedPointText) {
      var box = document.getElementById("selectedBox");
      var text = document.getElementById("selectedText");

      if (box && text) {
        box.style.display = "block";
        text.textContent = selectedPointText;
      }
    }

    function sendToWix(selectedPointText) {
      var payload = {
        type: "MPL_SELECTED",
        data: selectedPointText
      };

      console.log("FOXPOST wrapper sending to Wix:", payload);

      /*
        1) Object formátum: ezt használta a működő MPL.
        2) JSON string tartalék: ha a Wix HTML komponens stringként adja tovább.
      */
      window.parent.postMessage(payload, "*");
      window.parent.postMessage(JSON.stringify(payload), "*");
    }

    function receiveMessage(event) {
      rawMessageCount++;

      console.log("FOXPOST raw message:", {
        origin: event.origin,
        data: event.data
      });

      var data = parseMaybeJson(event.data);

      if (!data) {
        setDebug(
          "<strong>Debug:</strong> Üzenet érkezett, de nem feldolgozható JSON.<br>" +
          "Origin: " + clean(event.origin) + "<br>" +
          "Raw message count: " + rawMessageCount
        );
        return;
      }

      if (!looksLikeFoxpostPoint(data)) {
        setDebug(
          "<strong>Debug:</strong> Üzenet érkezett, de nem FOXPOST pont adat.<br>" +
          "Origin: " + clean(event.origin) + "<br>" +
          "Raw message count: " + rawMessageCount + "<br>" +
          "Data keys: " + Object.keys(data).join(", ")
        );
        return;
      }

      validPointCount++;

      var selectedPointText = buildSelectedPointText(data);

      showSelected(selectedPointText);
      sendToWix(selectedPointText);

      setDebug(
        "<strong>Debug:</strong> <strong>FOXPOST pont adat megérkezett a wrapperbe és elküldve Wix felé.</strong><br>" +
        "Valid point count: " + validPointCount + "<br>" +
        "Origin: " + clean(event.origin) + "<br>" +
        "Név: " + clean(data.name) + "<br>" +
        "Cím: " + clean(data.address || data.street) + "<br>" +
        "Operator: " + clean(data.operator_id || data.operatorId) + "<br>" +
        "Place: " + clean(data.place_id || data.placeId)
      );
    }

    window.addEventListener("message", receiveMessage, false);
  </script>
</body>
</html>
