<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    #foxpostFrame {
      width: 100%;
      height: 950px;
      border: 0;
      display: block;
    }
  </style>
</head>

<body>
  <iframe
    id="foxpostFrame"
    src="https://cdn.foxpost.hu/apt-finder/v1/app/"
    width="100%"
    height="950"
    frameborder="0"
    loading="lazy">
  </iframe>

  <script>
    console.log("Nutri-A FOXPOST wrapper betöltött - MPL_SELECTED kompatibilis verzió");

    function parseMaybeJson(value) {
      if (!value) {
        return null;
      }

      if (typeof value === "object") {
        return value;
      }

      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (error) {
          console.log("Nem JSON üzenet, kihagyva:", value);
          return null;
        }
      }

      return null;
    }

    function clean(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .replace(/[|\n\r;]/g, ",")
        .trim();
    }

    function shorten(value, maxLength) {
      var text = clean(value);

      if (text.length <= maxLength) {
        return text;
      }

      return text.substring(0, maxLength - 3) + "...";
    }

    function looksLikeFoxpostPoint(value) {
      if (!value || typeof value !== "object") {
        return false;
      }

      var hasName = Boolean(value.name);
      var hasAddress = Boolean(value.address || value.city || value.street);
      var hasId = Boolean(
        value.operator_id ||
        value.operatorId ||
        value.place_id ||
        value.placeId ||
        value.destinationId
      );

      return hasName && hasAddress && hasId;
    }

    function buildFoxpostNote(point) {
      var destinationId = clean(
        point.operator_id ||
        point.operatorId ||
        point.place_id ||
        point.placeId ||
        point.destinationId
      );

      var operatorId = clean(point.operator_id || point.operatorId);
      var placeId = clean(point.place_id || point.placeId);
      var name = clean(point.name);
      var address = clean(point.address);
      var zip = clean(point.zip);
      var city = clean(point.city);
      var street = clean(point.street);
      var findme = shorten(point.findme, 140);
      var variant = clean(point.variant);
      var serviceString = clean(point.serviceString);
      var paymentOptionsString = clean(point.paymentOptionsString);

      var parts = [
        "[FOXPOST]",
        destinationId ? "destination=" + destinationId : "",
        operatorId ? "operator=" + operatorId : "",
        placeId ? "place=" + placeId : "",
        name ? "name=" + name : "",
        address ? "address=" + address : "",
        zip ? "zip=" + zip : "",
        city ? "city=" + city : "",
        street ? "street=" + street : "",
        findme ? "findme=" + findme : "",
        variant ? "type=" + variant : "",
        serviceString ? "service=" + serviceString : "",
        paymentOptionsString ? "payment=" + paymentOptionsString : ""
      ];

      return parts.filter(Boolean).join(" | ");
    }

    function receiveMessage(event) {
      console.log("FOXPOST raw message:", event.origin, event.data);

      var apt = parseMaybeJson(event.data);

      if (!looksLikeFoxpostPoint(apt)) {
        return;
      }

      var foxpostNote = buildFoxpostNote(apt);

      console.log("FOXPOST note küldése Wixnek:", foxpostNote);

      /*
        Ez szándékosan MPL_SELECTED.
        A régi, működő Wix Cart Page kód ezt a formátumot várja.
      */
      window.parent.postMessage({
        type: "MPL_SELECTED",
        data: foxpostNote
      }, "*");
    }

    window.addEventListener("message", receiveMessage, false);
  </script>
</body>
</html>
