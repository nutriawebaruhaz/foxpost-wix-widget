<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FOXPOST átvevőhely választó</title>

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .wrap {
      padding: 10px;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    label {
      font-size: 13px;
      opacity: .9;
    }

    input {
      width: 220px;
      padding: 8px 10px;
      border: 1px solid #d7d7d7;
      border-radius: 10px;
      outline: none;
    }

    input:focus {
      border-color: #9a9a9a;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .searchBtn {
      background: #0c172b;
      color: #ffffff;
    }

    .selectBtn {
      width: 100%;
      margin-top: 8px;
      background: #c60000;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .hint {
      font-size: 12px;
      opacity: .7;
    }

    #map {
      width: 100%;
      height: 620px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #eee;
    }

    .selected {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 14px;
      background: #fafafa;
      font-size: 13px;
      display: none;
      line-height: 1.45;
    }

    .selected b {
      display: block;
      margin-bottom: 6px;
    }

    .small {
      font-size: 12px;
      opacity: .65;
      margin-top: 6px;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
    }

    .error {
      color: #b00020;
      font-weight: 700;
    }

    .popupTitle {
      font-weight: 700;
      color: #b00020;
      margin-bottom: 4px;
    }

    .popupLine {
      margin: 3px 0;
    }

    :focus {
      outline: none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <label for="searchInput">Település / irányítószám / cím:</label>
      <input id="searchInput" type="text" placeholder="pl. Budapest, 1088, Múzeum" />
      <button class="searchBtn" id="searchBtn">Keresés</button>
      <div class="hint" id="countText">FOXPOST pontok betöltése...</div>
    </div>

    <div id="map"></div>

    <div class="selected" id="selectedBox">
      <b>Kiválasztva:</b>
      <div id="selectedText"></div>
      <div class="small">A választás automatikusan mentésre kerül a kosár megjegyzésébe.</div>
    </div>

    <div class="status" id="statusText"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    console.log("FOXPOST saját Leaflet widget betöltött - MPL kompatibilis");

    var FOXPOST_JSON_URL = "https://cdn.foxpost.hu/foxplus.json";

    var map;
    var allPoints = [];
    var markers = [];
    var pointsByKey = {};

    function clean(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .replace(/[|\n\r;]/g, ",")
        .trim();
    }

    function shorten(value, maxLength) {
      var text = clean(value);

      if (text.length <= maxLength) {
        return text;
      }

      return text.substring(0, maxLength - 3) + "...";
    }

    function escapeHtml(value) {
      return clean(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getDestination(point) {
      return clean(point.operator_id || point.operatorId || point.place_id || point.placeId);
    }

    function pointKey(point, index) {
      return getDestination(point) || ("idx_" + index);
    }

    function normalizePoint(raw) {
      var point = raw || {};

      return {
        place_id: point.place_id || point.placeId || "",
        operator_id: point.operator_id || point.operatorId || "",
        name: point.name || "",
        address: point.address || "",
        zip: point.zip || "",
        city: point.city || "",
        street: point.street || "",
        findme: point.findme || "",
        geolat: point.geolat || point.lat || point.latitude || "",
        geolng: point.geolng || point.lng || point.lon || point.longitude || "",
        variant: point.variant || "",
        serviceString: point.serviceString || "",
        paymentOptionsString: point.paymentOptionsString || "",
        load: point.load || "",
        country: point.country || ""
      };
    }

    function normalizeList(json) {
      if (Array.isArray(json)) {
        return json.map(normalizePoint);
      }

      if (json && Array.isArray(json.data)) {
        return json.data.map(normalizePoint);
      }

      if (json && Array.isArray(json.items)) {
        return json.items.map(normalizePoint);
      }

      if (json && Array.isArray(json.features)) {
        return json.features.map(function(feature) {
          var props = feature.properties || {};
          var coords = feature.geometry && feature.geometry.coordinates;

          if (coords && coords.length >= 2) {
            props.geolng = props.geolng || coords[0];
            props.geolat = props.geolat || coords[1];
          }

          return normalizePoint(props);
        });
      }

      return [];
    }

    function buildSelectedPointText(point) {
      var destination = getDestination(point);
      var operatorId = clean(point.operator_id);
      var placeId = clean(point.place_id);
      var name = clean(point.name);
      var zip = clean(point.zip);
      var city = clean(point.city);
      var address = clean(point.address);
      var street = clean(point.street);
      var findme = shorten(point.findme, 160);
      var variant = clean(point.variant);
      var serviceString = clean(point.serviceString);
      var paymentOptionsString = clean(point.paymentOptionsString);
      var load = clean(point.load);
      var country = clean(point.country);

      return "FOXPOST"
        + " | " + (name || "-")
        + " | " + ((zip ? zip : "") + (city ? (" " + city) : "")).trim()
        + " | " + (address || street || "-")
        + " | DESTINATION:" + (destination || "-")
        + " | OPERATOR:" + (operatorId || "-")
        + " | PLACE:" + (placeId || "-")
        + (variant ? (" | TYPE:" + variant) : "")
        + (serviceString ? (" | SERVICE:" + serviceString) : "")
        + (paymentOptionsString ? (" | PAYMENT:" + paymentOptionsString) : "")
        + (load ? (" | LOAD:" + load) : "")
        + (country ? (" | COUNTRY:" + country) : "")
        + (findme ? (" | FINDME:" + findme) : "");
    }

    function buildPopupHtml(point, key) {
      var name = escapeHtml(point.name);
      var cityLine = escapeHtml((point.zip ? point.zip : "") + (point.city ? (" " + point.city) : ""));
      var address = escapeHtml(point.address || point.street || "");
      var variant = escapeHtml(point.variant || "FOXPOST");
      var service = escapeHtml(point.serviceString || "");
      var payment = escapeHtml(point.paymentOptionsString || "");

      return ''
        + '<div class="popupTitle">' + (name || "FOXPOST átvevőpont") + '</div>'
        + '<div class="popupLine">' + cityLine + '</div>'
        + '<div class="popupLine">' + address + '</div>'
        + '<div class="popupLine">' + variant + '</div>'
        + (service ? '<div class="popupLine">' + service + '</div>' : '')
        + (payment ? '<div class="popupLine">' + payment + '</div>' : '')
        + '<button class="selectBtn" onclick="selectFoxpostPoint(\'' + key + '\')">Csomagautomata kiválasztása</button>';
    }

    function initMap() {
      map = L.map("map").setView([47.1625, 19.5033], 7);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(map);
    }

    function clearMarkers() {
      markers.forEach(function(marker) {
        map.removeLayer(marker);
      });

      markers = [];
    }

    function renderPoints(points) {
      clearMarkers();
      pointsByKey = {};

      var bounds = [];

      points.forEach(function(point, index) {
        var lat = parseFloat(point.geolat);
        var lng = parseFloat(point.geolng);

        if (!isFinite(lat) || !isFinite(lng)) {
          return;
        }

        var key = pointKey(point, index);
        pointsByKey[key] = point;

        var marker = L.marker([lat, lng]).addTo(map);
        marker.bindPopup(buildPopupHtml(point, key), {
          maxWidth: 320
        });

        markers.push(marker);
        bounds.push([lat, lng]);
      });

      document.getElementById("countText").textContent = points.length + " FOXPOST pont megjelenítve";

      if (bounds.length) {
        map.fitBounds(bounds, {
          padding: [20, 20],
          maxZoom: 13
        });
      }
    }

    function searchPoints() {
      var q = clean(document.getElementById("searchInput").value).toLowerCase();

      if (!q) {
        renderPoints(allPoints);
        return;
      }

      var filtered = allPoints.filter(function(point) {
        var haystack = [
          point.name,
          point.zip,
          point.city,
          point.address,
          point.street,
          point.findme,
          point.variant
        ].join(" ").toLowerCase();

        return haystack.indexOf(q) !== -1;
      });

      renderPoints(filtered);
    }

    function selectFoxpostPoint(key) {
      var point = pointsByKey[key];

      if (!point) {
        console.error("FOXPOST pont nem található kulcs alapján:", key);
        return;
      }

      var selectedPointText = buildSelectedPointText(point);

      var box = document.getElementById("selectedBox");
      var text = document.getElementById("selectedText");
      var status = document.getElementById("statusText");

      if (box && text) {
        box.style.display = "block";
        text.textContent = selectedPointText;
      }

      if (status) {
        status.textContent = "FOXPOST pont kiválasztva, adat küldése a Wix kosárnak...";
      }

      console.log("FOXPOST kiválasztva, küldés Wix felé:", selectedPointText);

      window.parent.postMessage({
        type: "MPL_SELECTED",
        data: selectedPointText
      }, "*");
    }

    window.selectFoxpostPoint = selectFoxpostPoint;

    async function loadFoxpostPoints() {
      var status = document.getElementById("statusText");

      try {
        var response = await fetch(FOXPOST_JSON_URL, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("FOXPOST lista lekérés hiba: " + response.status);
        }

        var json = await response.json();
        var points = normalizeList(json)
          .filter(function(point) {
            return getDestination(point) && point.name && (point.geolat || point.geolng);
          });

        allPoints = points;

        if (status) {
          status.textContent = "FOXPOST lista betöltve.";
        }

        renderPoints(allPoints);
      } catch (error) {
        console.error("FOXPOST lista betöltési hiba:", error);

        document.getElementById("countText").textContent = "FOXPOST lista betöltési hiba";

        if (status) {
          status.innerHTML = '<span class="error">Nem sikerült betölteni a FOXPOST pontokat: '
            + escapeHtml(error.message || String(error))
            + '</span>';
        }
      }
    }

    document.getElementById("searchBtn").addEventListener("click", searchPoints);

    document.getElementById("searchInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        searchPoints();
      }
    });

    initMap();
    loadFoxpostPoints();
  </script>
</body>
</html>
