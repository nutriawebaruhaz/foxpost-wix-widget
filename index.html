<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FOXPOST átvevőhely választó</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .wrap {
      padding: 10px;
      box-sizing: border-box;
    }

    #foxpostFrame {
      width: 100%;
      height: 700px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #eee;
      display: block;
    }

    .selected {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 14px;
      background: #fafafa;
      font-size: 13px;
      display: none;
      line-height: 1.45;
    }

    .selected b {
      display: block;
      margin-bottom: 6px;
    }

    .small {
      font-size: 12px;
      opacity: .65;
      margin-top: 6px;
    }

    .debug {
      margin-top: 8px;
      font-size: 12px;
      color: #555;
      word-break: break-word;
    }

    :focus {
      outline: none !important;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <iframe
      id="foxpostFrame"
      src="https://cdn.foxpost.hu/apt-finder/v1/app/"
      width="100%"
      height="700"
      frameborder="0"
      loading="lazy">
    </iframe>

    <div class="selected" id="selectedBox">
      <b>Kiválasztva:</b>
      <div id="selectedText"></div>
      <div class="small">A választás automatikusan mentésre kerül a kosár megjegyzésébe.</div>
      <div class="debug" id="debugText"></div>
    </div>
  </div>

  <script>
    console.log("FOXPOST widget wrapper loaded - MPL compatible v2");

    function parseMaybeJson(value) {
      if (!value) {
        return null;
      }

      if (typeof value === "object") {
        return value;
      }

      if (typeof value === "string") {
        try {
          return JSON.parse(value);
        } catch (error) {
          console.log("FOXPOST: nem JSON üzenet, kihagyva:", value);
          return null;
        }
      }

      return null;
    }

    function clean(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .replace(/[|\n\r;]/g, ",")
        .trim();
    }

    function shorten(value, maxLength) {
      var text = clean(value);

      if (text.length <= maxLength) {
        return text;
      }

      return text.substring(0, maxLength - 3) + "...";
    }

    function looksLikeFoxpostPoint(value) {
      if (!value || typeof value !== "object") {
        return false;
      }

      var hasName = Boolean(value.name);
      var hasAddress = Boolean(value.address || value.city || value.street);
      var hasId = Boolean(value.operator_id || value.place_id);

      return hasName && hasAddress && hasId;
    }

    function buildSelectedPointText(data) {
      var operatorId = clean(data.operator_id);
      var placeId = clean(data.place_id);
      var destination = operatorId || placeId;

      var name = clean(data.name);
      var zip = clean(data.zip);
      var city = clean(data.city);
      var address = clean(data.address);
      var street = clean(data.street);
      var findme = shorten(data.findme, 160);
      var variant = clean(data.variant);
      var serviceString = clean(data.serviceString);
      var paymentOptionsString = clean(data.paymentOptionsString);
      var load = clean(data.load);
      var country = clean(data.country);

      return "FOXPOST"
        + " | " + (name || "-")
        + " | " + ((zip ? zip : "") + (city ? (" " + city) : "")).trim()
        + " | " + (address || street || "-")
        + " | DESTINATION:" + (destination || "-")
        + " | OPERATOR:" + (operatorId || "-")
        + " | PLACE:" + (placeId || "-")
        + (variant ? (" | TYPE:" + variant) : "")
        + (serviceString ? (" | SERVICE:" + serviceString) : "")
        + (paymentOptionsString ? (" | PAYMENT:" + paymentOptionsString) : "")
        + (load ? (" | LOAD:" + load) : "")
        + (country ? (" | COUNTRY:" + country) : "")
        + (findme ? (" | FINDME:" + findme) : "");
    }

    function showSelected(selectedPointText, rawData) {
      var box = document.getElementById("selectedBox");
      var text = document.getElementById("selectedText");
      var debug = document.getElementById("debugText");

      if (box && text) {
        box.style.display = "block";
        text.textContent = selectedPointText;
      }

      if (debug) {
        debug.textContent = "FOXPOST adat megérkezett a wrapperbe. " + new Date().toLocaleTimeString();
      }

      console.log("FOXPOST kiválasztás feldolgozva:", selectedPointText, rawData);
    }

    function sendToWix(selectedPointText) {
      var payload = {
        type: "MPL_SELECTED",
        data: selectedPointText
      };

      console.log("FOXPOST küldés Wix felé object:", payload);

      /*
        1) MPL-hez azonos object forma.
        2) Tartalék JSON string forma.
        3) Tartalék top irány, ha a Wix belső iframe-réteg miatt parent nem elég.
      */
      window.parent.postMessage(payload, "*");
      window.parent.postMessage(JSON.stringify(payload), "*");

      if (window.top && window.top !== window.parent) {
        window.top.postMessage(payload, "*");
        window.top.postMessage(JSON.stringify(payload), "*");
      }
    }

    function receiveMessage(event) {
      console.log("FOXPOST raw message:", event.origin, event.data);

      var data = parseMaybeJson(event.data);

      if (!looksLikeFoxpostPoint(data)) {
        return;
      }

      var selectedPointText = buildSelectedPointText(data);

      showSelected(selectedPointText, data);
      sendToWix(selectedPointText);
    }

    window.addEventListener("message", receiveMessage, false);
  </script>
</body>
</html>
